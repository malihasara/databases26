<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Campus Clubs{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="{{ url_for('auth.login') }}">Campus Clubs</a>
    <nav>
      {% if g.user %}
        <a href="{{ url_for('auth.login') }}">My Clubs</a>
        <span class="who">{{ g.user.FirstName }}</span>
        <form method="post" action="{{ url_for('auth.logout') }}" class="inline">
          <button class="link" type="submit">Log out</button>
        </form>
      {% else %}
        <a href="{{ url_for('auth.login') }}">Log in</a>
        <a href="{{ url_for('auth.register') }}">Register</a>
      {% endif %}
    </nav>
  </header>

  <main>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, msg in messages %}
        <div class="flash {{ category }}">{{ msg }}</div>
      {% endfor %}
    {% endwith %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>
